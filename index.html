<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YNT</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, black, pink);
            font-family: Arial, sans-serif;
            color: white;
        }

        button {
            padding: 20px 40px;
            font-size: 18px;
            color: white;
            background-color: #ff69b4; /* pink */
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #ff1493; /* darker pink */
            transform: scale(1.1);
        }

        #message {
            margin-top: 30px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            display: none; /* hidden until button click */
        }
    </style>
</head>
<body>
    <button onclick="showMessage()">Who is the most beautiful girl in the world?</button>
    <div id="message">YASNAAA yasakaaa</div>

    <script>
        function showMessage() {
            document.getElementById('message').style.display = 'block';
        }
    </script>
</body>
</html>
