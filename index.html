<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YNT</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, black, pink);
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        button {
            padding: 20px 40px;
            font-size: 18px;
            color: white;
            background-color: #ff69b4; /* pink */
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            z-index: 10;
        }

        button:hover {
            background-color: #ff1493; /* darker pink */
            transform: scale(1.1);
        }

        #message {
            margin-top: 30px;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            color: #ff1493;
            text-shadow: 0 0 5px #ff1493, 0 0 10px #ff69b4, 0 0 20px #ff1493;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* Sparkle effect */
        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            animation: sparkle 1s linear infinite;
            opacity: 0.8;
        }

        @keyframes sparkle {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-20px) scale(1.5); opacity: 0.5; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <button onclick="showMessage()">Who is the most beautiful girl in the world?</button>
    <div id="message">YASNAAA yasakaaa</div>

    <script>
        function showMessage() {
            const msg = document.getElementById('message');
            msg.style.opacity = 1;
            msg.style.transform = 'scale(1)';

            // Add sparkles
            for (let i = 0; i < 30; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.top = Math.random() * window.innerHeight + 'px';
                sparkle.style.left = Math.random() * window.innerWidth + 'px';
                sparkle.style.animationDuration = (0.5 + Math.random()) + 's';
                document.body.appendChild(sparkle);

                // Remove sparkle after animation
                setTimeout(() => sparkle.remove(), 1000);
            }
        }
    </script>
</body>
</html>
